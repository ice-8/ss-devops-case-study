---
# Defaults shared by every environment. Environment-specific group_vars
# (minikube.yml, production.yml) override individual keys.
app_name: spidersilk-app
app_s3_prefix: "processed/"
app_aws_region: "eu-west-1"
app_max_upload_mb: "10"
app_log_level: "INFO"

# See infra/ansible/README.md for the full render/deploy flow.
generated_values_dir: "{{ playbook_dir }}/../helm/spidersilk-app/generated"

# false = render-only (safe default); pass -e deploy_with_helm=true to also apply.
deploy_with_helm: false
