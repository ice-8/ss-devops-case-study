---
# Defaults shared by every environment. Environment-specific group_vars
# (minikube.yml, production.yml) override individual keys.
app_name: spidersilk-app
app_s3_prefix: "processed/"
app_aws_region: "eu-west-1"
app_max_upload_mb: "10"
app_log_level: "INFO"

# Where the rendered Helm values fragment is written; consumed by:
#   helm upgrade --install spidersilk infra/helm/spidersilk-app \
#     -f infra/helm/spidersilk-app/values.yaml \
#     -f infra/helm/spidersilk-app/generated/<env>-app-config.yaml
generated_values_dir: "{{ playbook_dir }}/../helm/spidersilk-app/generated"

# Set to true to have the playbook also run `helm upgrade --install` after
# rendering config. Left false by default so running the playbook is always
# safe (render-only) unless explicitly opted in.
deploy_with_helm: false
