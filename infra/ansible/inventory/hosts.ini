# The app runs in Kubernetes, not on managed VMs, so Ansible's "hosts" here
# are just the control node rendering config per environment (see README.md
# in this directory for why). Each group maps to a values-<env>.yaml layer.
#
# Each environment uses a distinct host alias (not the bare "localhost") even
# though ansible_host is the same machine — group_vars apply per *host*, so
# reusing "localhost" as the inventory_hostname in two groups would merge
# both groups' vars onto the same host instead of keeping them separate.

[minikube]
minikube-local ansible_host=localhost ansible_connection=local

[production]
production-local ansible_host=localhost ansible_connection=local
