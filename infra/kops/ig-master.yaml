# Control-plane instance group. Always on-demand — masters are never a good
# candidate for spot interruption.
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  name: master-eu-west-1a
  labels:
    kops.k8s.io/cluster: spidersilk.k8s.local
spec:
  role: Master
  image: 099720109477/ubuntu/images/hvm-ssd-gp3/ubuntu-resolute-26.04-amd64-server-*
  machineType: t3.medium
  minSize: 1
  maxSize: 1
  subnets:
    - eu-west-1a
  cloudLabels:
    Project: spidersilk
