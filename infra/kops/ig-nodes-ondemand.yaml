apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  name: nodes-ondemand
  labels:
    kops.k8s.io/cluster: spidersilk.k8s.local
spec:
  role: Node
  image: 099720109477/ubuntu/images/hvm-ssd-gp3/ubuntu-resolute-26.04-amd64-server-*
  machineType: t3.medium
  minSize: 2
  maxSize: 6
  # Default hop limit (1) blocks pods from reaching IMDS for the node-role S3
  # credentials in additionalPolicies.node (cluster.yaml) — pod traffic to
  # 169.254.169.254 is 2 hops, not 1. See infra/kops/README.md Troubleshooting.
  instanceMetadata:
    httpPutResponseHopLimit: 2
    httpTokens: required
  subnets:
    - eu-west-1a
    - eu-west-1b
    - eu-west-1c
  mixedInstancesPolicy:
    instances:
      - t3.medium
      - t3a.medium
      - t3.large
    onDemandBase: 2
    onDemandAboveBase: 100
    spotAllocationStrategy: lowest-price
  nodeLabels:
    kops.k8s.io/instancegroup: nodes-ondemand
    node-lifecycle: on-demand
  cloudLabels:
    Project: spidersilk
    node-lifecycle: on-demand
    k8s.io/cluster-autoscaler/enabled: "true"
    k8s.io/cluster-autoscaler/spidersilk.k8s.local: owned
