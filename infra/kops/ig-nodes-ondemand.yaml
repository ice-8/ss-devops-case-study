# On-demand worker instance group. Uses mixedInstancesPolicy across several
# instance types (for capacity flexibility) but keeps them 100% on-demand
# (onDemandPercentageAboveBase: 100) — this is the "steady state" pool.
#
# cloudLabels carry the AWS ASG auto-discovery tags Cluster Autoscaler needs;
# see cluster-autoscaler.yaml. The same two tags are set on every worker IG
# in this directory so one Cluster Autoscaler deployment covers all of them.
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  name: nodes-ondemand
  labels:
    kops.k8s.io/cluster: spidersilk.k8s.local
spec:
  role: Node
  image: 099720109477/ubuntu/images/hvm-ssd-gp3/ubuntu-resolute-26.04-amd64-server-*
  machineType: t3.medium
  minSize: 2
  maxSize: 6
  subnets:
    - eu-west-1a
    - eu-west-1b
    - eu-west-1c
  mixedInstancesPolicy:
    instances:
      - t3.medium
      - t3a.medium
      - t3.large
    onDemandBase: 2
    onDemandAboveBase: 100
    spotAllocationStrategy: lowest-price
  nodeLabels:
    kops.k8s.io/instancegroup: nodes-ondemand
    node-lifecycle: on-demand
  cloudLabels:
    Project: spidersilk
    node-lifecycle: on-demand
    k8s.io/cluster-autoscaler/enabled: "true"
    k8s.io/cluster-autoscaler/spidersilk.k8s.local: owned
