# Spot worker instance group. mixedInstancesPolicy diversified across several
# instance types/families (better spot availability + interruption spread),
# 100% spot capacity (onDemandBase: 0, onDemandAboveBase: 0), allocated with
# capacity-optimized to minimize interruption frequency. Taken together with
# ig-nodes-ondemand.yaml, this gives the cluster both lifecycles side by side.
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  name: nodes-spot
  labels:
    kops.k8s.io/cluster: spidersilk.k8s.local
spec:
  role: Node
  image: 099720109477/ubuntu/images/hvm-ssd-gp3/ubuntu-resolute-26.04-amd64-server-*
  machineType: t3.medium
  minSize: 0
  maxSize: 10
  subnets:
    - eu-west-1a
    - eu-west-1b
    - eu-west-1c
  mixedInstancesPolicy:
    instances:
      - t3.medium
      - t3a.medium
      - t3.large
      - t3a.large
    onDemandBase: 0
    onDemandAboveBase: 0
    spotAllocationStrategy: capacity-optimized
  nodeLabels:
    kops.k8s.io/instancegroup: nodes-spot
    node-lifecycle: spot
  taints:
    - node-lifecycle=spot:PreferNoSchedule
  cloudLabels:
    Project: spidersilk
    node-lifecycle: spot
    k8s.io/cluster-autoscaler/enabled: "true"
    k8s.io/cluster-autoscaler/spidersilk.k8s.local: owned
