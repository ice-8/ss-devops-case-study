# kops Cluster resource for the SpiderSilk case study.
#
# Uses a `.k8s.local` gossip cluster name so it's a valid, self-contained
# config that doesn't depend on owning a real Route53 domain — matches the
# brief's "not expecting to have running cluster."
#
# Apply with:
#   export KOPS_STATE_STORE=s3://spidersilk-app-kops-state-store
#   kops create -f infra/kops/cluster.yaml
#   kops create -f infra/kops/ig-master.yaml
#   kops create -f infra/kops/ig-nodes-ondemand.yaml
#   kops create -f infra/kops/ig-nodes-spot.yaml
#   kops create secret --name spidersilk.k8s.local sshpublickey admin -i ~/.ssh/id_rsa.pub
#   kops update cluster --name spidersilk.k8s.local --yes
apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: spidersilk.k8s.local
spec:
  kubernetesVersion: "1.35.6"
  cloudProvider: aws

  channel: stable
  configBase: s3://spidersilk-app-kops-state-store/spidersilk.k8s.local

  networking:
    calico: {}

  networkCIDR: 10.20.0.0/16
  nonMasqueradeCIDR: 100.64.0.0/10

  topology:
    dns:
      type: Public
    masters: public
    nodes: public

  # Hand-authored Cluster YAML (applied via `kops create -f`, not the
  # `kops create cluster` CLI wizard) does NOT get the wizard's implicit
  # --ssh-access/--api-loadbalancer defaults — without these two fields kops
  # provisions the master/node security groups with no ingress rule at all
  # for port 22 or the API port, which is why SSH and kubectl access were
  # both unreachable. Open to any source for this demo cluster; for a real
  # environment scope these down to your office/VPN CIDR instead of 0.0.0.0/0.
  sshAccess:
    - 0.0.0.0/0
  kubernetesApiAccess:
    - 0.0.0.0/0

  api:
    loadBalancer:
      type: Public
      class: Network

  authorization:
    rbac: {}

  iam:
    allowContainerRegistry: true
    legacy: false

  subnets:
    - name: eu-west-1a
      type: Public
      zone: eu-west-1a
      cidr: 10.20.32.0/19
    - name: eu-west-1b
      type: Public
      zone: eu-west-1b
      cidr: 10.20.64.0/19
    - name: eu-west-1c
      type: Public
      zone: eu-west-1c
      cidr: 10.20.96.0/19

  etcdClusters:
    - name: main
      etcdMembers:
        - name: a
          instanceGroup: master-eu-west-1a
      version: "3.5.13"
    - name: events
      etcdMembers:
        - name: a
          instanceGroup: master-eu-west-1a
      version: "3.5.13"

  # kubelet/cluster-autoscaler-friendly defaults
  kubelet:
    anonymousAuth: false

  cloudLabels:
    Project: spidersilk
    ManagedBy: kops
