# `.k8s.local` gossip name — no real Route53 domain required. See
# infra/kops/README.md for bring-up/teardown commands.
apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: spidersilk.k8s.local
spec:
  kubernetesVersion: "1.35.6"
  cloudProvider: aws

  channel: stable
  configBase: s3://spidersilk-app-kops-state-store/spidersilk.k8s.local

  networking:
    calico: {}

  networkCIDR: 10.20.0.0/16
  nonMasqueradeCIDR: 100.64.0.0/10

  topology:
    dns:
      type: Public
    masters: public
    nodes: public

  # See infra/kops/README.md "SSH (22) / API (443) access"
  sshAccess:
    - 0.0.0.0/0
  kubernetesApiAccess:
    - 0.0.0.0/0

  api:
    loadBalancer:
      type: Public
      class: Network

  authorization:
    rbac: {}

  iam:
    allowContainerRegistry: true
    legacy: false

  # Grants the app's S3 access (infra/s3/iam-app-policy.json) to the shared
  # node IAM role — both worker IGs use role: Node with no per-IG iam.profile,
  # so this covers the app pod regardless of which one it schedules onto.
  # Keep in sync with infra/s3/iam-app-policy.json's Statement array.
  additionalPolicies:
    node: |
      [
        {
          "Effect": "Allow",
          "Action": ["s3:PutObject", "s3:GetObject"],
          "Resource": "arn:aws:s3:::spidersilk-app-spidersilk-processed-files/processed/*"
        },
        {
          "Effect": "Allow",
          "Action": "s3:ListBucket",
          "Resource": "arn:aws:s3:::spidersilk-app-spidersilk-processed-files",
          "Condition": { "StringLike": { "s3:prefix": "processed/*" } }
        }
      ]

  subnets:
    - name: eu-west-1a
      type: Public
      zone: eu-west-1a
      cidr: 10.20.32.0/19
    - name: eu-west-1b
      type: Public
      zone: eu-west-1b
      cidr: 10.20.64.0/19
    - name: eu-west-1c
      type: Public
      zone: eu-west-1c
      cidr: 10.20.96.0/19

  etcdClusters:
    - name: main
      etcdMembers:
        - name: a
          instanceGroup: master-eu-west-1a
      version: "3.5.13"
    - name: events
      etcdMembers:
        - name: a
          instanceGroup: master-eu-west-1a
      version: "3.5.13"

  # kubelet/cluster-autoscaler-friendly defaults
  kubelet:
    anonymousAuth: false

  cloudLabels:
    Project: spidersilk
    ManagedBy: kops
