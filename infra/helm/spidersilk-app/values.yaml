# Default values for spidersilk-app.
# Override per-environment with -f values-minikube.yaml, -f values-prod.yaml, etc.
# infra/ansible renders an additional appConfig-only fragment
# (see infra/ansible/roles/app_config) that gets layered on top of this file.

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

image:
  app:
    repository: CHANGEME-dockerhub-user/spidersilk-app
    tag: latest
    pullPolicy: IfNotPresent
  nginx:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  host: spidersilk.example.com
  annotations: {}

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 75

resources:
  nginx:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  app:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Application configuration. In practice this block is generated by the
# Ansible role in infra/ansible (source of truth for app config) and passed
# with -f, rather than hand-edited here — see infra/ansible/README.md.
appConfig:
  s3Bucket: ""
  s3Prefix: "processed/"
  awsRegion: "us-east-1"
  maxUploadMb: "10"
  logLevel: "INFO"

# Only needed if the app is granted S3 access via IRSA (IAM Roles for
# Service Accounts) instead of node instance-profile credentials.
serviceAccount:
  create: true
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/spidersilk-app

# Allow scheduling onto the kops spot instance group, which is tainted
# node-lifecycle=spot:PreferNoSchedule (see infra/kops/ig-nodes-spot.yaml).
tolerations:
  - key: "node-lifecycle"
    operator: "Equal"
    value: "spot"
    effect: "PreferNoSchedule"

nodeSelector: {}
affinity: {}

podAnnotations: {}
