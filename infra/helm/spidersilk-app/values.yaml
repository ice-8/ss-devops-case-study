# Default values for spidersilk-app. Override with -f values-<env>.yaml.
# appConfig is normally generated by infra/ansible — see its README.

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

image:
  app:
    repository: icenin9/spidersilk-app
    tag: v4
    pullPolicy: IfNotPresent
  nginx:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  host: spidersilk.example.com
  annotations: {}

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 75

resources:
  nginx:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  app:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

appConfig:
  s3Bucket: ""
  s3Prefix: "processed/"
  awsRegion: "eu-west-1"
  maxUploadMb: "10"
  logLevel: "INFO"

# emptyDir volumes (app-data, shared-static) are created root-owned at pod
# start, shadowing whatever ownership the image baked in at build time. The
# app/static-sync containers run as a non-root user with no fixed UID, so
# fsGroup is what actually makes those volumes writable/readable for them —
# Kubernetes adds this GID as a supplementary group to every container in
# the pod and chgrp's each volume to it, regardless of the container's UID.
podSecurityContext:
  fsGroup: 1000

# Only needed if the app is granted S3 access via IRSA (IAM Roles for
# Service Accounts) instead of node instance-profile credentials.
serviceAccount:
  create: true
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/spidersilk-app

# Allow scheduling onto the kops spot instance group, which is tainted
# node-lifecycle=spot:PreferNoSchedule (see infra/kops/ig-nodes-spot.yaml).
tolerations:
  - key: "node-lifecycle"
    operator: "Equal"
    value: "spot"
    effect: "PreferNoSchedule"

nodeSelector: {}
affinity: {}

podAnnotations: {}
