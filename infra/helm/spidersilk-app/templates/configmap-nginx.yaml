apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spidersilk-app.fullname" . }}-nginx
  labels:
    {{- include "spidersilk-app.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # Public static files (css/js) are shared with the app container via
        # an emptyDir volume (see deployment.yaml) — not NFS — so nginx can
        # serve them directly without proxying every asset request.
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1h;
            add_header Cache-Control "public";
        }

        location /healthz {
            proxy_pass http://127.0.0.1:5000/healthz;
        }

        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size {{ .Values.appConfig.maxUploadMb | default "10" }}m;
        }
    }
